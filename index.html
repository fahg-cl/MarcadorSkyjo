<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title>Skyjo</title>

  <!-- Modo app para iPhone / iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Skyjo" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#f5f7fb" />

  <!-- Icono de la app: subir posteriormente un archivo llamado icon.png en la misma carpeta -->
  <link rel="apple-touch-icon" href="icon.png" />
  <link rel="icon" type="image/png" href="icon.png" />
  <link rel="manifest" href="manifest.webmanifest" />

  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --panel-soft: #f9fafc;
      --text: #172033;
      --muted: #667085;
      --line: #dde3ee;
      --primary: #2f6fec;
      --primary-dark: #1f56bd;
      --danger: #d92d20;
      --warning: #f59e0b;
      --shadow: 0 12px 32px rgba(16, 24, 40, 0.10);
      --radius-lg: 22px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(47, 111, 236, 0.10), transparent 28rem),
        radial-gradient(circle at bottom right, rgba(245, 158, 11, 0.10), transparent 28rem),
        var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: calc(10px + var(--safe-top)) 10px calc(10px + var(--safe-bottom));
      overflow-x: hidden;
    }

    button {
      font: inherit;
      border: 0;
      cursor: pointer;
      touch-action: manipulation;
      user-select: none;
    }

    .app {
      width: min(1180px, 100%);
      margin: 0 auto;
    }

    .layout {
      display: grid;
      grid-template-columns: 360px minmax(0, 1fr);
      gap: 12px;
      align-items: start;
    }

    .app.config-hidden .layout {
      grid-template-columns: 1fr;
    }

    .app.config-hidden .config-panel {
      display: none;
    }

    .panel {
      background: rgba(255, 255, 255, 0.90);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.92);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-header {
      padding: 12px 14px 10px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,0.55);
    }

    .compact-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .header-title {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      font-weight: 950;
      letter-spacing: -0.02em;
    }

    .header-title span:last-child {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .header-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      flex-wrap: wrap;
      gap: 6px;
    }

    .panel-body {
      padding: 12px;
    }

    .tiny-btn,
    .switch-btn,
    .choice-btn,
    .action-btn,
    .icon-btn,
    .score-btn,
    .key-btn {
      border-radius: var(--radius-sm);
      background: var(--panel-soft);
      color: var(--text);
      border: 1px solid var(--line);
      font-weight: 850;
      transition: transform 0.12s ease, background 0.12s ease, border 0.12s ease, box-shadow 0.12s ease, opacity 0.12s ease;
    }

    .tiny-btn:active,
    .switch-btn:active,
    .choice-btn:active,
    .action-btn:active,
    .icon-btn:active,
    .score-btn:active,
    .key-btn:active {
      transform: scale(0.97);
    }

    .tiny-btn {
      min-height: 36px;
      min-width: 36px;
      padding: 0 10px;
      background: #fff;
      font-size: 0.92rem;
    }

    .tiny-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .sync-status {
      margin-top: 8px;
      padding: 6px 8px;
      border-radius: 999px;
      background: #eef5ff;
      border: 1px solid rgba(47,111,236,0.22);
      color: var(--primary-dark);
      font-size: 0.76rem;
      font-weight: 850;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .viewer-mode .score-btn:disabled {
      opacity: 1;
      cursor: default;
      background: rgba(255,255,255,0.74);
      color: var(--text);
    }

    .tiny-btn.danger {
      color: var(--danger);
      border-color: rgba(217, 45, 32, 0.22);
    }

    .switch-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 36px;
      padding: 0 10px;
      background: #fff;
      font-size: 0.88rem;
      color: var(--muted);
    }

    .switch-dot {
      width: 28px;
      height: 16px;
      border-radius: 999px;
      background: #cbd5e1;
      position: relative;
      flex: 0 0 auto;
    }

    .switch-dot::after {
      content: "";
      position: absolute;
      top: 2px;
      left: 2px;
      width: 12px;
      height: 12px;
      background: #fff;
      border-radius: 999px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.20);
      transition: transform 0.16s ease;
    }

    .switch-btn[aria-checked="true"] .switch-dot {
      background: var(--primary);
    }

    .switch-btn[aria-checked="true"] .switch-dot::after {
      transform: translateX(12px);
    }

    .setting-block {
      margin-bottom: 12px;
    }

    .setting-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
      color: var(--text);
      font-weight: 900;
      font-size: 0.94rem;
    }

    .setting-title small {
      color: var(--muted);
      font-weight: 750;
    }

    .btn-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 7px;
    }

    .choice-btn {
      min-height: 40px;
      background: var(--panel-soft);
      font-size: 0.95rem;
    }

    .choice-btn.active {
      background: #eaf1ff;
      border-color: rgba(47,111,236,0.55);
      color: var(--primary-dark);
      box-shadow: inset 0 0 0 1px rgba(47,111,236,0.12);
    }

    .players-list {
      display: grid;
      gap: 8px;
    }

    .player-card {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      padding: 9px;
      background: var(--panel-soft);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
    }

    .turn-pill {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      color: #fff;
      font-weight: 950;
      box-shadow: inset 0 0 0 100px rgba(0,0,0,0.08);
      position: relative;
    }

    .turn-pill .mini-mark {
      position: absolute;
      right: -5px;
      top: -7px;
      font-size: 0.8rem;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 999px;
      width: 20px;
      height: 20px;
      display: grid;
      place-items: center;
      box-shadow: 0 4px 10px rgba(16,24,40,0.10);
    }

    .player-name {
      width: 100%;
      min-height: 38px;
      padding: 0 10px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      outline: none;
      font-weight: 800;
      color: var(--text);
    }

    .player-name:focus {
      border-color: rgba(47,111,236,0.75);
      box-shadow: 0 0 0 4px rgba(47,111,236,0.12);
    }

    .player-flags {
      display: flex;
      gap: 5px;
      margin-top: 6px;
      flex-wrap: wrap;
      min-height: 22px;
    }

    .flag {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 999px;
      padding: 3px 7px;
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 850;
      line-height: 1;
    }

    .flag.dealer {
      color: var(--primary-dark);
      border-color: rgba(47,111,236,0.24);
      background: #eef5ff;
    }

    .flag.starter {
      color: #9a5b00;
      border-color: rgba(245,158,11,0.28);
      background: #fff7df;
    }

    .color-row {
      display: flex;
      gap: 5px;
      margin-top: 7px;
      flex-wrap: wrap;
    }

    .color-btn {
      width: 22px;
      height: 22px;
      border-radius: 999px;
      border: 2px solid rgba(255,255,255,0.95);
      box-shadow: 0 0 0 1px rgba(16, 24, 40, 0.18);
    }

    .color-btn.active {
      box-shadow: 0 0 0 3px rgba(47,111,236,0.22), 0 0 0 1px rgba(16, 24, 40, 0.22);
    }

    .order-actions {
      display: grid;
      grid-template-columns: 38px;
      gap: 5px;
    }

    .icon-btn {
      width: 38px;
      min-height: 34px;
      background: #fff;
    }

    .icon-btn.active-dealer {
      background: #eef5ff;
      border-color: rgba(47,111,236,0.40);
      color: var(--primary-dark);
    }

    .primary-actions {
      display: grid;
      gap: 8px;
      position: sticky;
      bottom: calc(8px + var(--safe-bottom));
      z-index: 2;
      padding-top: 6px;
      background: linear-gradient(transparent, rgba(255,255,255,0.94) 24%);
    }

    .action-btn {
      min-height: 46px;
      padding: 0 14px;
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
      box-shadow: 0 10px 22px rgba(47, 111, 236, 0.22);
    }

    .action-btn.secondary {
      background: #fff;
      color: var(--primary-dark);
      box-shadow: none;
      border-color: rgba(47,111,236,0.22);
    }

    .action-btn.danger {
      background: #fff;
      color: var(--danger);
      border-color: rgba(217,45,32,0.24);
      box-shadow: none;
    }

    .status-line {
      min-height: 18px;
      color: var(--muted);
      font-size: 0.78rem;
      text-align: center;
      font-weight: 700;
    }

    .score-panel {
      min-height: 520px;
    }

    .summary-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 9px;
    }

    .summary-bar.hidden {
      display: none;
    }

    .summary-chip {
      background: var(--panel-soft);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 8px;
      color: var(--muted);
      font-weight: 850;
      font-size: 0.78rem;
    }

    .summary-chip.active {
      color: var(--primary-dark);
      background: #eef5ff;
      border-color: rgba(47,111,236,0.22);
    }

    .leaderboard {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(126px, 1fr));
      gap: 8px;
      margin: 10px 12px 0;
    }

    .leader-card {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px;
      background: var(--panel-soft);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      min-width: 0;
    }

    .leader-dot {
      width: 12px;
      height: 36px;
      border-radius: 999px;
      flex: 0 0 auto;
    }

    .leader-card strong {
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 0.94rem;
    }

    .leader-card span {
      color: var(--muted);
      font-weight: 850;
      font-size: 0.8rem;
    }

    .winner {
      background: #fff7df;
      border-color: rgba(245, 158, 11, 0.35);
    }

    .table-wrap {
      overflow: auto;
      margin: 10px 12px 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: #fff;
      max-height: calc(100vh - 210px - var(--safe-top) - var(--safe-bottom));
    }

    .summary-collapsed .leaderboard {
      margin-top: 8px;
    }

    .summary-collapsed .table-wrap {
      max-height: calc(100vh - 170px - var(--safe-top) - var(--safe-bottom));
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      min-width: 540px;
    }

    th,
    td {
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      text-align: center;
      padding: 6px;
    }

    th:last-child,
    td:last-child {
      border-right: 0;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 3;
      background: #fff;
      font-size: 0.86rem;
      color: var(--text);
      padding: 8px 6px;
    }

    .round-head {
      position: sticky;
      left: 0;
      z-index: 4;
      min-width: 102px;
      text-align: left;
      background: #fff;
    }

    tbody .round-cell {
      position: sticky;
      left: 0;
      z-index: 2;
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(4px);
      text-align: left;
      min-width: 102px;
      font-weight: 950;
      vertical-align: middle;
    }

    .round-meta {
      display: grid;
      gap: 3px;
    }

    .round-meta small {
      display: block;
      color: var(--muted);
      font-weight: 800;
      line-height: 1.1;
      font-size: 0.68rem;
    }

    .player-header {
      display: grid;
      place-items: center;
      gap: 4px;
      min-width: 78px;
    }

    .player-label {
      max-width: 106px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 950;
    }

    .player-color-line {
      width: 34px;
      height: 5px;
      border-radius: 999px;
    }

    .score-btn {
      width: 100%;
      min-height: 44px;
      background: rgba(255,255,255,0.74);
      line-height: 1.12;
      padding: 5px;
    }

    .score-btn:disabled {
      cursor: not-allowed;
      opacity: 0.55;
      background: #f3f4f6;
      color: #98a2b3;
    }

    .active-row .score-btn:not(:disabled) {
      border-color: rgba(47,111,236,0.28);
      box-shadow: inset 0 0 0 1px rgba(47,111,236,0.05);
    }

    .completed-row .score-btn:not(:disabled) {
      background: rgba(255,255,255,0.68);
    }

    .score-round {
      display: block;
      font-weight: 950;
      color: var(--text);
    }

    .score-total {
      display: block;
      font-size: 0.72rem;
      color: var(--muted);
      font-weight: 850;
      margin-top: 2px;
    }

    .starter-mark {
      display: inline-grid;
      place-items: center;
      width: 20px;
      height: 20px;
      margin-left: 3px;
      border-radius: 999px;
      background: #fff7df;
      border: 1px solid rgba(245, 158, 11, 0.35);
      font-size: 0.72rem;
      vertical-align: middle;
    }

    .empty-state {
      display: grid;
      place-items: center;
      min-height: 320px;
      padding: 24px;
      text-align: center;
      color: var(--muted);
    }

    .empty-state strong {
      display: block;
      color: var(--text);
      font-size: 1.05rem;
      margin-bottom: 7px;
    }

    .score-editor-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.30);
      display: none;
      align-items: end;
      justify-content: center;
      padding: 10px;
      z-index: 20;
    }

    .score-editor-backdrop.open {
      display: flex;
    }

    .score-editor {
      width: min(470px, 100%);
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, 0.28);
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.9);
    }

    .editor-head {
      padding: 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .editor-head h3 {
      margin: 0;
      font-size: 1.05rem;
      line-height: 1.2;
    }

    .editor-head small {
      display: block;
      color: var(--muted);
      margin-top: 4px;
      font-weight: 750;
    }

    .editor-close {
      width: 40px;
      height: 40px;
      border-radius: 999px;
      background: var(--panel-soft);
      border: 1px solid var(--line);
      font-size: 1.1rem;
      color: var(--primary-dark);
      flex: 0 0 auto;
    }

    .editor-body {
      padding: 14px;
    }

    .score-display {
      width: 100%;
      height: 58px;
      border: 1px solid rgba(47,111,236,0.55);
      border-radius: var(--radius-md);
      display: grid;
      place-items: center;
      font-size: 1.6rem;
      font-weight: 950;
      outline: none;
      background: #fff;
      box-shadow: 0 0 0 4px rgba(47,111,236,0.10);
    }

    .score-display.placeholder {
      color: #98a2b3;
    }

    .keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 12px;
    }

    .key-btn {
      min-height: 50px;
      background: var(--panel-soft);
      font-size: 1.08rem;
    }

    .key-btn.sign {
      color: var(--primary-dark);
    }

    .editor-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .panel-body {
        padding: 10px;
      }

      .btn-grid {
        grid-template-columns: repeat(4, minmax(58px, 1fr));
      }

      .score-panel {
        min-height: auto;
      }

      .table-wrap {
        max-height: calc(100vh - 205px - var(--safe-top) - var(--safe-bottom));
      }

      .summary-collapsed .table-wrap {
        max-height: calc(100vh - 165px - var(--safe-top) - var(--safe-bottom));
      }
    }

    @media (max-width: 560px) {
      body {
        padding-left: 8px;
        padding-right: 8px;
      }

      .panel {
        border-radius: 18px;
      }

      .panel-header {
        padding: 10px;
      }

      .header-actions {
        gap: 5px;
      }

      .switch-btn .switch-label {
        display: none;
      }

      .player-card {
        grid-template-columns: auto minmax(0, 1fr);
      }

      .order-actions {
        grid-column: 1 / -1;
        grid-template-columns: repeat(3, 1fr);
      }

      .icon-btn {
        width: 100%;
      }

      .summary-bar {
        gap: 5px;
      }

      .summary-chip {
        font-size: 0.73rem;
        padding: 5px 7px;
      }

      .leaderboard {
        grid-template-columns: 1fr 1fr;
      }

      table {
        min-width: 500px;
      }

      .player-header {
        min-width: 70px;
      }

      .player-label {
        max-width: 78px;
      }

      .round-head,
      tbody .round-cell {
        min-width: 94px;
      }

      .score-btn {
        min-height: 42px;
      }
    }

    @media (orientation: landscape) and (max-height: 540px) {
      body {
        padding-top: calc(6px + var(--safe-top));
        padding-bottom: calc(6px + var(--safe-bottom));
      }

      .layout {
        grid-template-columns: 325px minmax(0, 1fr);
        gap: 8px;
      }

      .app.config-hidden .layout {
        grid-template-columns: 1fr;
      }

      .panel-header,
      .panel-body {
        padding: 8px;
      }

      .setting-block {
        margin-bottom: 8px;
      }

      .players-list {
        max-height: calc(100vh - 250px);
        overflow: auto;
        padding-right: 2px;
      }

      .leaderboard {
        display: none;
      }

      .table-wrap {
        margin: 8px;
        max-height: calc(100vh - 88px - var(--safe-top) - var(--safe-bottom));
      }

      .summary-collapsed .table-wrap {
        max-height: calc(100vh - 68px - var(--safe-top) - var(--safe-bottom));
      }

      .score-editor-backdrop {
        align-items: center;
      }

      .score-editor {
        max-height: calc(100vh - 14px);
        overflow: auto;
      }

      .key-btn {
        min-height: 42px;
      }

      .score-display {
        height: 48px;
      }
    }
  </style>
</head>

<body>
  <main class="app" id="app">
    <section class="layout">
      <aside class="panel config-panel" aria-labelledby="config-title">
        <div class="panel-header compact-header">
          <div class="header-title" id="config-title">
            <span>⚙️</span>
            <span>Configuración</span>
          </div>
          <button class="tiny-btn" id="hide-config-btn" type="button" title="Ocultar configuración">🙈</button>
        </div>

        <div class="panel-body">
          <div class="setting-block">
            <div class="setting-title">
              <span>👥 Jugadores</span>
              <small id="player-count-label">2 jugadores</small>
            </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

    // Para activar el código de juego compartido, reemplaza estos valores
    // por la configuración de tu proyecto Firebase Web App.
/*    const FIREBASE_CONFIG = {
      apiKey: "PEGAR_API_KEY",
      authDomain: "PEGAR_AUTH_DOMAIN",
      databaseURL: "PEGAR_DATABASE_URL",
      projectId: "PEGAR_PROJECT_ID",
      appId: "PEGAR_APP_ID"
    };
*/

  // Import the functions you need from the SDKs you need
  // import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
  // import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-analytics.js";
  // TODO: Add SDKs for Firebase products that you want to use
  // https://firebase.google.com/docs/web/setup#available-libraries

  // Your web app's Firebase configuration
  // For Firebase JS SDK v7.20.0 and later, measurementId is optional
  const FIREBASE_CONFIG = {
    apiKey: "AIzaSyBGtGjLmO_uPJbeK5aZXsPFPfbjDI9IO44",
    authDomain: "skyjo-puntaje.firebaseapp.com",
    databaseURL: "https://skyjo-puntaje-default-rtdb.firebaseio.com",
    projectId: "skyjo-puntaje",
    storageBucket: "skyjo-puntaje.firebasestorage.app",
    messagingSenderId: "374539834776",
    appId: "1:374539834776:web:1f3a51149d66562e9287ed",
    measurementId: "G-9SWEQVE4P7"
  };

    const CONFIG_KEY = "skyjo_config_v2";
    const GAME_KEY = "skyjo_game_v2";
    const UI_KEY = "skyjo_ui_v2";
    const SYNC_KEY = "skyjo_sync_v3";

    const LEGACY_CONFIG_KEY = "skyjo_config_v1";
    const LEGACY_GAME_KEY = "skyjo_game_v1";

    const COLORS = [
      { name: "Rojo", value: "#ef4444" },
      { name: "Azul", value: "#3b82f6" },
      { name: "Verde", value: "#22c55e" },
      { name: "Amarillo", value: "#f59e0b" },
      { name: "Morado", value: "#8b5cf6" },
      { name: "Naranjo", value: "#f97316" },
      { name: "Celeste", value: "#06b6d4" },
      { name: "Rosado", value: "#ec4899" }
    ];

    const PLAYER_OPTIONS = [2, 3, 4, 5, 6, 7, 8];
    const ROUND_OPTIONS = [5, 10, 15, 20];

    const makeId = () => {
      if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
      return `p_${Date.now()}_${Math.random().toString(16).slice(2)}`;
    };

    const defaultPlayers = Array.from({ length: 8 }, (_, index) => ({
      id: makeId(),
      name: `Jugador ${index + 1}`,
      color: COLORS[index].value
    }));

    const defaultConfig = {
      playerCount: 2,
      rounds: 10,
      startingDealerId: defaultPlayers[0].id,
      players: defaultPlayers
    };

    let config = loadConfig();
    let game = loadGame();
    let ui = loadUi();
    let selectedCell = null;
    let scoreDraft = "";
    let sync = loadSync();
    let remoteSaveTimer = null;
    let remoteRefreshTimer = null;

    const firebaseState = {
      ready: false,
      app: null,
      auth: null,
      db: null,
      user: null
    };

    const el = {
      app: document.getElementById("app"),
      scorePanel: document.getElementById("score-panel"),
      playerCountButtons: document.getElementById("player-count-buttons"),
      playerCountLabel: document.getElementById("player-count-label"),
      roundButtons: document.getElementById("round-buttons"),
      roundCountLabel: document.getElementById("round-count-label"),
      playersList: document.getElementById("players-list"),
      saveStatus: document.getElementById("save-status"),
      startGameBtn: document.getElementById("start-game-btn"),
      continueGameBtn: document.getElementById("continue-game-btn"),
      emptyState: document.getElementById("empty-state"),
      gameArea: document.getElementById("game-area"),
      gameSummary: document.getElementById("game-summary"),
      scoreTable: document.getElementById("score-table"),
      leaderboard: document.getElementById("leaderboard"),
      clearScoresBtn: document.getElementById("clear-scores-btn"),
      shareBtn: document.getElementById("share-btn"),
      hostCodeBtn: document.getElementById("host-code-btn"),
      watchCodeBtn: document.getElementById("watch-code-btn"),
      refreshRemoteBtn: document.getElementById("refresh-remote-btn"),
      exitViewerBtn: document.getElementById("exit-viewer-btn"),
      syncStatus: document.getElementById("sync-status"),
      toggleConfigBtn: document.getElementById("toggle-config-btn"),
      hideConfigBtn: document.getElementById("hide-config-btn"),
      toggleSummaryBtn: document.getElementById("toggle-summary-btn"),
      editorBackdrop: document.getElementById("score-editor-backdrop"),
      closeEditorBtn: document.getElementById("close-editor-btn"),
      editorTitle: document.getElementById("editor-title"),
      editorSubtitle: document.getElementById("editor-subtitle"),
      scoreDisplay: document.getElementById("score-display"),
      saveScoreBtn: document.getElementById("save-score-btn"),
      deleteScoreBtn: document.getElementById("delete-score-btn")
    };

    init();

    function init() {
      normalizeConfig();
      applyIncomingGameCode();
      applyUi();
      renderConfig();
      renderGame();
      bindEvents();
      startRemoteAutoRefresh();
      if (isViewerMode() && sync.code) {
        refreshRemoteGame(true);
      }
    }

    function loadConfig() {
      try {
        const stored = JSON.parse(localStorage.getItem(CONFIG_KEY)) || JSON.parse(localStorage.getItem(LEGACY_CONFIG_KEY));
        if (!stored) return clone(defaultConfig);

        const players = [...(stored.players || [])];
        while (players.length < 8) {
          players.push({
            id: makeId(),
            name: `Jugador ${players.length + 1}`,
            color: COLORS[players.length % COLORS.length].value
          });
        }

        return {
          playerCount: clamp(Number(stored.playerCount) || 2, 2, 8),
          rounds: ROUND_OPTIONS.includes(Number(stored.rounds)) ? Number(stored.rounds) : 10,
          startingDealerId: stored.startingDealerId || players[0]?.id,
          players: players.slice(0, 8).map((player, index) => ({
            id: player.id || makeId(),
            name: player.name || `Jugador ${index + 1}`,
            color: player.color || COLORS[index % COLORS.length].value
          }))
        };
      } catch {
        return clone(defaultConfig);
      }
    }

    function loadGame() {
      try {
        const stored = JSON.parse(localStorage.getItem(GAME_KEY)) || JSON.parse(localStorage.getItem(LEGACY_GAME_KEY));
        if (!stored || !stored.players || !stored.scores) return null;

        return {
          createdAt: stored.createdAt || new Date().toISOString(),
          rounds: Number(stored.rounds) || 10,
          players: stored.players,
          startingDealerId: stored.startingDealerId || stored.players[0]?.id,
          scores: stored.scores
        };
      } catch {
        return null;
      }
    }

    function loadUi() {
      try {
        const stored = JSON.parse(localStorage.getItem(UI_KEY));
        return {
          configVisible: stored?.configVisible !== false,
          summaryVisible: stored?.summaryVisible !== false
        };
      } catch {
        return { configVisible: true, summaryVisible: true };
      }
    }

    function loadSync() {
      try {
        const stored = JSON.parse(localStorage.getItem(SYNC_KEY));
        return {
          mode: stored?.mode || null,
          code: stored?.code || null,
          lastRemoteUpdate: stored?.lastRemoteUpdate || null
        };
      } catch {
        return { mode: null, code: null, lastRemoteUpdate: null };
      }
    }

    function saveConfig() {
      normalizeConfig();
      localStorage.setItem(CONFIG_KEY, JSON.stringify(config));
      showSaveStatus("✅ Guardado");
    }

    function saveGame() {
      if (!game) return;
      localStorage.setItem(GAME_KEY, JSON.stringify(game));
      if (isHostMode() && sync.code) {
        queueRemoteSave();
      }
    }

    function saveUi() {
      localStorage.setItem(UI_KEY, JSON.stringify(ui));
    }

    function saveSync() {
      localStorage.setItem(SYNC_KEY, JSON.stringify(sync));
    }

    function normalizeConfig() {
      config.playerCount = clamp(Number(config.playerCount) || 2, 2, 8);
      config.rounds = ROUND_OPTIONS.includes(Number(config.rounds)) ? Number(config.rounds) : 10;

      const activeIds = config.players.slice(0, config.playerCount).map(player => player.id);
      if (!activeIds.includes(config.startingDealerId)) {
        config.startingDealerId = activeIds[0];
      }
    }

    function showSaveStatus(message) {
      el.saveStatus.textContent = message;
      window.clearTimeout(showSaveStatus.timer);
      showSaveStatus.timer = window.setTimeout(() => {
        el.saveStatus.textContent = "Listo";
      }, 1200);
    }

    function applyUi() {
      const viewer = isViewerMode();
      if (viewer) ui.configVisible = false;

      el.app.classList.toggle("viewer-mode", viewer);
      el.app.classList.toggle("config-hidden", !ui.configVisible);
      el.toggleConfigBtn.setAttribute("aria-checked", String(ui.configVisible));
      el.toggleConfigBtn.title = ui.configVisible ? "Ocultar configuración" : "Mostrar configuración";
      el.toggleConfigBtn.classList.toggle("hidden", viewer);
      el.gameSummary.classList.toggle("hidden", !ui.summaryVisible);
      el.scorePanel.classList.toggle("summary-collapsed", !ui.summaryVisible);
      el.toggleSummaryBtn.textContent = ui.summaryVisible ? "👁️" : "🙈";
      el.toggleSummaryBtn.title = ui.summaryVisible ? "Ocultar resumen" : "Mostrar resumen";

      el.hostCodeBtn.classList.toggle("hidden", viewer);
      el.watchCodeBtn.classList.toggle("hidden", viewer);
      el.clearScoresBtn.classList.toggle("hidden", viewer);
      el.refreshRemoteBtn.classList.toggle("hidden", !viewer);
      el.exitViewerBtn.classList.toggle("hidden", !viewer);
      el.syncStatus.classList.toggle("hidden", !sync.code);
    }

    function renderConfig() {
      normalizeConfig();

      el.playerCountLabel.textContent = `${config.playerCount} jugadores`;
      el.roundCountLabel.textContent = `${config.rounds} rondas`;

      el.playerCountButtons.innerHTML = "";
      PLAYER_OPTIONS.forEach(count => {
        const button = document.createElement("button");
        button.className = `choice-btn ${config.playerCount === count ? "active" : ""}`;
        button.type = "button";
        button.textContent = `👥 ${count}`;
        button.setAttribute("aria-pressed", String(config.playerCount === count));
        button.addEventListener("click", () => {
          config.playerCount = count;
          saveConfig();
          renderConfig();
          renderGame();
        });
        el.playerCountButtons.appendChild(button);
      });

      el.roundButtons.innerHTML = "";
      ROUND_OPTIONS.forEach(rounds => {
        const button = document.createElement("button");
        button.className = `choice-btn ${config.rounds === rounds ? "active" : ""}`;
        button.type = "button";
        button.textContent = `🔁 ${rounds}`;
        button.setAttribute("aria-pressed", String(config.rounds === rounds));
        button.addEventListener("click", () => {
          config.rounds = rounds;
          saveConfig();
          renderConfig();
        });
        el.roundButtons.appendChild(button);
      });

      const activePlayers = config.players.slice(0, config.playerCount);
      const dealerIndex = getIndexById(activePlayers, config.startingDealerId);
      const starterIndex = (dealerIndex + 1) % activePlayers.length;

      el.playersList.innerHTML = "";
      activePlayers.forEach((player, index) => {
        const isDealer = index === dealerIndex;
        const isStarter = index === starterIndex;

        const card = document.createElement("div");
        card.className = "player-card";

        const turn = document.createElement("div");
        turn.className = "turn-pill";
        turn.style.background = player.color;
        turn.textContent = index + 1;
        turn.title = `Turno ${index + 1}`;
        if (isDealer || isStarter) {
          const mark = document.createElement("span");
          mark.className = "mini-mark";
          mark.textContent = isDealer ? "🃏" : "⭐";
          turn.appendChild(mark);
        }

        const fields = document.createElement("div");

        const input = document.createElement("input");
        input.className = "player-name";
        input.value = player.name;
        input.placeholder = `Jugador ${index + 1}`;
        input.setAttribute("aria-label", `Nombre jugador ${index + 1}`);
        input.addEventListener("input", () => {
          player.name = input.value;
          saveConfig();
          renderGame();
        });
        input.addEventListener("blur", () => {
          player.name = cleanName(input.value, index);
          input.value = player.name;
          saveConfig();
          renderConfig();
          renderGame();
        });

        const flags = document.createElement("div");
        flags.className = "player-flags";
        if (isDealer) {
          const flag = document.createElement("span");
          flag.className = "flag dealer";
          flag.textContent = "🃏 reparte 1ª";
          flags.appendChild(flag);
        }
        if (isStarter) {
          const flag = document.createElement("span");
          flag.className = "flag starter";
          flag.textContent = "⭐ parte 1ª";
          flags.appendChild(flag);
        }

        const colorRow = document.createElement("div");
        colorRow.className = "color-row";
        COLORS.forEach(color => {
          const colorBtn = document.createElement("button");
          colorBtn.className = `color-btn ${player.color === color.value ? "active" : ""}`;
          colorBtn.type = "button";
          colorBtn.style.background = color.value;
          colorBtn.title = color.name;
          colorBtn.setAttribute("aria-label", `Color ${color.name}`);
          colorBtn.addEventListener("click", () => {
            player.color = color.value;
            saveConfig();
            renderConfig();
            renderGame();
          });
          colorRow.appendChild(colorBtn);
        });

        fields.appendChild(input);
        fields.appendChild(flags);
        fields.appendChild(colorRow);

        const actions = document.createElement("div");
        actions.className = "order-actions";

        const dealerBtn = document.createElement("button");
        dealerBtn.className = `icon-btn ${isDealer ? "active-dealer" : ""}`;
        dealerBtn.type = "button";
        dealerBtn.textContent = "🃏";
        dealerBtn.title = "Marcar como jugador que reparte primero";
        dealerBtn.addEventListener("click", () => {
          config.startingDealerId = player.id;
          saveConfig();
          renderConfig();
          renderGame();
        });

        const upBtn = document.createElement("button");
        upBtn.className = "icon-btn";
        upBtn.type = "button";
        upBtn.textContent = "⬆️";
        upBtn.title = "Subir en el orden";
        upBtn.disabled = index === 0;
        upBtn.addEventListener("click", () => movePlayer(index, -1));

        const downBtn = document.createElement("button");
        downBtn.className = "icon-btn";
        downBtn.type = "button";
        downBtn.textContent = "⬇️";
        downBtn.title = "Bajar en el orden";
        downBtn.disabled = index === config.playerCount - 1;
        downBtn.addEventListener("click", () => movePlayer(index, 1));

        actions.appendChild(dealerBtn);
        actions.appendChild(upBtn);
        actions.appendChild(downBtn);

        card.appendChild(turn);
        card.appendChild(fields);
        card.appendChild(actions);

        el.playersList.appendChild(card);
      });

      el.continueGameBtn.classList.toggle("hidden", !game);
    }

    function movePlayer(index, direction) {
      const target = index + direction;
      if (target < 0 || target >= config.playerCount) return;

      const copy = [...config.players];
      [copy[index], copy[target]] = [copy[target], copy[index]];
      config.players = copy;
      saveConfig();
      renderConfig();
      renderGame();
    }

    function bindEvents() {
      el.startGameBtn.addEventListener("click", startNewGame);
      el.continueGameBtn.addEventListener("click", () => {
        game = loadGame();
        renderGame();
        scrollToScore();
      });

      el.clearScoresBtn.addEventListener("click", () => {
        if (!game) return;
        const ok = confirm("¿Quieres limpiar todos los puntajes de la partida actual?");
        if (!ok) return;
        game.scores = createEmptyScores(game.rounds, game.players.length);
        saveGame();
        renderGame();
      });

      el.shareBtn.addEventListener("click", shareSummary);
      el.hostCodeBtn.addEventListener("click", createOrUpdateGameCode);
      el.watchCodeBtn.addEventListener("click", askAndLoadSpectatorGame);
      el.refreshRemoteBtn.addEventListener("click", () => refreshRemoteGame(true));
      el.exitViewerBtn.addEventListener("click", exitViewerMode);

      el.toggleConfigBtn.addEventListener("click", () => {
        ui.configVisible = !ui.configVisible;
        saveUi();
        applyUi();
      });

      el.hideConfigBtn.addEventListener("click", () => {
        ui.configVisible = false;
        saveUi();
        applyUi();
      });

      el.toggleSummaryBtn.addEventListener("click", () => {
        ui.summaryVisible = !ui.summaryVisible;
        saveUi();
        applyUi();
      });

      el.closeEditorBtn.addEventListener("click", closeEditor);
      el.editorBackdrop.addEventListener("click", event => {
        if (event.target === el.editorBackdrop) closeEditor();
      });

      el.saveScoreBtn.addEventListener("click", saveSelectedScore);
      el.deleteScoreBtn.addEventListener("click", deleteSelectedScore);

      document.querySelectorAll(".key-btn").forEach(button => {
        button.addEventListener("click", () => handleKeypad(button.dataset.key));
      });

      document.addEventListener("keydown", event => {
        if (!el.editorBackdrop.classList.contains("open")) return;

        if (/^\d$/.test(event.key)) {
          event.preventDefault();
          appendDigit(event.key);
        }

        if (event.key === "-" || event.key === "+") {
          event.preventDefault();
          toggleSign();
        }

        if (event.key === "Backspace") {
          event.preventDefault();
          scoreDraft = scoreDraft.slice(0, -1);
          renderScoreDraft();
        }

        if (event.key === "Enter") {
          event.preventDefault();
          saveSelectedScore();
        }

        if (event.key === "Escape") {
          event.preventDefault();
          closeEditor();
        }
      });
    }

    function startNewGame() {
      normalizeConfig();

      const players = config.players.slice(0, config.playerCount).map((player, index) => ({
        id: player.id,
        name: cleanName(player.name, index),
        color: player.color
      }));

      config.players = [
        ...players,
        ...config.players.slice(config.playerCount)
      ];
      saveConfig();

      game = {
        createdAt: new Date().toISOString(),
        rounds: config.rounds,
        players,
        startingDealerId: config.startingDealerId,
        scores: createEmptyScores(config.rounds, players.length)
      };

      sync = { mode: null, code: null, lastRemoteUpdate: null };
      saveSync();
      stopRemoteAutoRefresh();
      saveGame();
      renderConfig();
      renderGame();
      scrollToScore();
    }

    function createEmptyScores(rounds, playerCount) {
      return Array.from({ length: rounds }, () => Array.from({ length: playerCount }, () => null));
    }

    function renderGame() {
      if (!game) {
        el.emptyState.classList.remove("hidden");
        el.gameArea.classList.add("hidden");
        el.gameSummary.innerHTML = "";
        renderSyncStatus();
        el.shareBtn.disabled = true;
        el.clearScoresBtn.disabled = true;
        return;
      }

      el.shareBtn.disabled = false;
      el.clearScoresBtn.disabled = false;
      el.hostCodeBtn.disabled = isViewerMode();
      el.emptyState.classList.add("hidden");
      el.gameArea.classList.remove("hidden");

      renderSummary();
      renderSyncStatus();
      renderLeaderboard();
      renderScoreTable();
      el.continueGameBtn.classList.toggle("hidden", !game);
    }

    function renderSummary() {
      const currentRoundIndex = getCurrentRoundIndex();
      const activeText = currentRoundIndex === null ? "Partida completa" : `Ronda activa ${currentRoundIndex + 1}`;
      const startingDealerIndex = getIndexById(game.players, game.startingDealerId);
      const firstStarterIndex = (startingDealerIndex + 1) % game.players.length;

      const syncChip = sync.code
        ? `<span class="summary-chip">${isViewerMode() ? "👀" : "🔗"} ${escapeHtml(sync.code)}</span>`
        : "";

      el.gameSummary.innerHTML = `
        <span class="summary-chip active">🎯 ${escapeHtml(activeText)}</span>
        <span class="summary-chip">👥 ${game.players.length}</span>
        <span class="summary-chip">🔁 ${game.rounds}</span>
        <span class="summary-chip">🃏 ${escapeHtml(getShortName(game.players[startingDealerIndex].name))}</span>
        <span class="summary-chip">⭐ ${escapeHtml(getShortName(game.players[firstStarterIndex].name))}</span>
        ${syncChip}
      `;
    }

    function renderLeaderboard() {
      const totals = getTotals();
      const ordered = game.players.map((player, index) => ({
        player,
        index,
        total: totals[index]
      })).sort((a, b) => a.total - b.total);

      el.leaderboard.innerHTML = "";
      ordered.forEach((item, rank) => {
        const card = document.createElement("div");
        card.className = `leader-card ${rank === 0 ? "winner" : ""}`;

        const dot = document.createElement("div");
        dot.className = "leader-dot";
        dot.style.background = item.player.color;

        const text = document.createElement("div");
        text.innerHTML = `
          <strong>${rank === 0 ? "🏆 " : ""}${escapeHtml(item.player.name)}</strong>
          <span>${formatNumber(item.total)} puntos</span>
        `;

        card.appendChild(dot);
        card.appendChild(text);
        el.leaderboard.appendChild(card);
      });
    }

    function renderScoreTable() {
      const labels = getDisplayLabels(game.players);
      const totalsByRound = getTotalsByRound();
      const currentRoundIndex = getCurrentRoundIndex();
      const startingDealerIndex = getIndexById(game.players, game.startingDealerId);
      const viewer = isViewerMode();

      const table = document.createElement("table");

      const thead = document.createElement("thead");
      const headerRow = document.createElement("tr");

      const roundHead = document.createElement("th");
      roundHead.className = "round-head";
      roundHead.textContent = "Ronda";
      headerRow.appendChild(roundHead);

      game.players.forEach((player, index) => {
        const th = document.createElement("th");
        const header = document.createElement("div");
        header.className = "player-header";

        const label = document.createElement("span");
        label.className = "player-label";
        label.textContent = labels[index];
        label.title = player.name;

        const line = document.createElement("span");
        line.className = "player-color-line";
        line.style.background = player.color;

        header.appendChild(label);
        header.appendChild(line);
        th.appendChild(header);
        headerRow.appendChild(th);
      });

      thead.appendChild(headerRow);
      table.appendChild(thead);

      const tbody = document.createElement("tbody");

      for (let roundIndex = 0; roundIndex < game.rounds; roundIndex++) {
        const dealerIndex = (startingDealerIndex + roundIndex) % game.players.length;
        const starterIndex = (dealerIndex + 1) % game.players.length;
        const dealer = game.players[dealerIndex];
        const starter = game.players[starterIndex];

        const isCompleted = isRoundCompleted(roundIndex);
        const isActive = currentRoundIndex === roundIndex;
        const isLocked = currentRoundIndex !== null && roundIndex > currentRoundIndex;

        const tr = document.createElement("tr");
        tr.style.background = hexToRgba(dealer.color, 0.12);
        tr.className = isLocked ? "locked-row" : isActive ? "active-row" : isCompleted ? "completed-row" : "";

        const roundCell = document.createElement("td");
        roundCell.className = "round-cell";
        roundCell.innerHTML = `
          <div class="round-meta">
            <strong>${isLocked ? "🔒 " : isActive ? "🎯 " : ""}Ronda ${roundIndex + 1}</strong>
            <small>🃏 ${escapeHtml(getShortName(dealer.name))}</small>
            <small>⭐ ${escapeHtml(getShortName(starter.name))}</small>
          </div>
        `;
        tr.appendChild(roundCell);

        game.players.forEach((player, playerIndex) => {
          const td = document.createElement("td");
          const score = game.scores[roundIndex][playerIndex];
          const total = totalsByRound[roundIndex][playerIndex];

          const button = document.createElement("button");
          button.className = "score-btn";
          button.type = "button";
          button.disabled = isLocked || viewer;
          button.style.borderColor = playerIndex === starterIndex && !isLocked ? "rgba(245, 158, 11, 0.55)" : "";
          button.innerHTML = renderCellContent(score, total, playerIndex === starterIndex, isLocked, viewer);

          button.title = isLocked
            ? `Ronda ${roundIndex + 1} bloqueada hasta completar la ronda anterior`
            : viewer
              ? `${player.name}, ronda ${roundIndex + 1} · solo lectura`
              : `${player.name}, ronda ${roundIndex + 1}`;

          button.addEventListener("click", () => {
            if (!isLocked && !viewer) openEditor(roundIndex, playerIndex);
          });

          td.appendChild(button);
          tr.appendChild(td);
        });

        tbody.appendChild(tr);
      }

      table.appendChild(tbody);
      el.scoreTable.replaceWith(table);
      table.id = "score-table";
      el.scoreTable = table;
    }

    function renderCellContent(score, total, isStarter, isLocked, viewer = false) {
      const mark = isStarter ? '<span class="starter-mark">⭐</span>' : "";

      if (isLocked) {
        return `<span class="score-round">🔒</span><span class="score-total">Bloqueada</span>${mark}`;
      }

      if (score === null) {
        const text = viewer ? "Pendiente" : "Ingresar";
        return `<span class="score-round">＋</span><span class="score-total">${text}</span>${mark}`;
      }

      return `<span class="score-round">${formatNumber(score)} - ${formatNumber(total)}</span><span class="score-total">Ronda - Total</span>${mark}`;
    }

    function openEditor(roundIndex, playerIndex) {
      if (isViewerMode()) return;
      selectedCell = { roundIndex, playerIndex };
      const player = game.players[playerIndex];
      const value = game.scores[roundIndex][playerIndex];

      el.editorTitle.textContent = player.name;
      el.editorSubtitle.textContent = `Ronda ${roundIndex + 1} · Puntaje de la ronda`;
      scoreDraft = value === null ? "" : String(value);
      renderScoreDraft();
      el.editorBackdrop.classList.add("open");

      setTimeout(() => el.scoreDisplay.focus(), 50);
    }

    function closeEditor() {
      selectedCell = null;
      scoreDraft = "";
      el.editorBackdrop.classList.remove("open");
      renderScoreDraft();
    }

    function renderScoreDraft() {
      const displayValue = scoreDraft === "" || scoreDraft === "-" ? "0" : scoreDraft;
      el.scoreDisplay.textContent = displayValue;
      el.scoreDisplay.classList.toggle("placeholder", scoreDraft === "" || scoreDraft === "-");
    }

    function saveSelectedScore() {
      if (!selectedCell || !game) return;

      if (scoreDraft === "" || scoreDraft === "-") {
        scoreDraft = "0";
      }

      const value = Number(scoreDraft);
      if (!Number.isInteger(value)) {
        renderScoreDraft();
        return;
      }

      game.scores[selectedCell.roundIndex][selectedCell.playerIndex] = Object.is(value, -0) ? 0 : value;
      saveGame();
      closeEditor();
      renderGame();
    }

    function deleteSelectedScore() {
      if (!selectedCell || !game) return;
      game.scores[selectedCell.roundIndex][selectedCell.playerIndex] = null;
      saveGame();
      closeEditor();
      renderGame();
    }

    function handleKeypad(key) {
      if (key === "back") {
        scoreDraft = scoreDraft.slice(0, -1);
        renderScoreDraft();
        return;
      }

      if (key === "sign") {
        toggleSign();
        return;
      }

      if (/^\d$/.test(key)) {
        appendDigit(key);
      }
    }

    function appendDigit(digit) {
      const negative = scoreDraft.startsWith("-");
      let clean = scoreDraft.replace("-", "");

      if (clean.length >= 4) return;

      if (clean === "0") clean = digit;
      else clean += digit;

      scoreDraft = negative ? `-${clean}` : clean;
      renderScoreDraft();
    }

    function toggleSign() {
      if (scoreDraft.startsWith("-")) {
        scoreDraft = scoreDraft.slice(1);
      } else {
        scoreDraft = scoreDraft === "" ? "-" : `-${scoreDraft}`;
      }
      renderScoreDraft();
    }

    function getCurrentRoundIndex() {
      if (!game) return null;

      for (let roundIndex = 0; roundIndex < game.scores.length; roundIndex++) {
        if (!isRoundCompleted(roundIndex)) return roundIndex;
      }

      return null;
    }

    function isRoundCompleted(roundIndex) {
      return game.scores[roundIndex].every(value => value !== null && value !== undefined);
    }

    function getTotals() {
      if (!game) return [];
      return game.players.map((_, playerIndex) => {
        return game.scores.reduce((sum, round) => sum + (Number(round[playerIndex]) || 0), 0);
      });
    }

    function getTotalsByRound() {
      const totals = Array.from({ length: game.rounds }, () => Array.from({ length: game.players.length }, () => 0));
      const running = Array.from({ length: game.players.length }, () => 0);

      for (let roundIndex = 0; roundIndex < game.rounds; roundIndex++) {
        for (let playerIndex = 0; playerIndex < game.players.length; playerIndex++) {
          const value = game.scores[roundIndex][playerIndex];
          if (value !== null && value !== undefined) running[playerIndex] += Number(value) || 0;
          totals[roundIndex][playerIndex] = running[playerIndex];
        }
      }

      return totals;
    }

    function getDisplayLabels(players) {
      if (players.length <= 4) {
        return players.map(player => player.name);
      }

      const bases = players.map(player => getInitialBase(player.name));
      const seen = new Map();

      return bases.map(base => {
        const count = seen.get(base) || 0;
        seen.set(base, count + 1);
        return count === 0 ? base : `${base}${count + 1}`;
      });
    }

    function getInitialBase(name) {
      const parts = name
        .trim()
        .replace(/\s+/g, " ")
        .split(" ")
        .filter(Boolean);

      if (parts.length >= 2) {
        return `${parts[0][0] || "J"}${parts[1][0] || ""}`.toUpperCase();
      }

      return (parts[0]?.[0] || "J").toUpperCase();
    }

    function getShortName(name) {
      const clean = name.trim();
      if (clean.length <= 10) return clean;
      const parts = clean.split(/\s+/).filter(Boolean);
      if (parts.length >= 2) return `${parts[0]} ${parts[1][0].toUpperCase()}.`;
      return clean.slice(0, 10) + "…";
    }

    function cleanName(value, index) {
      const clean = String(value || "").trim().replace(/\s+/g, " ");
      return clean || `Jugador ${index + 1}`;
    }


    function isFirebaseConfigured() {
      return Boolean(
        FIREBASE_CONFIG.apiKey &&
        FIREBASE_CONFIG.databaseURL &&
        !String(FIREBASE_CONFIG.apiKey).startsWith("PEGAR_") &&
        !String(FIREBASE_CONFIG.databaseURL).startsWith("PEGAR_")
      );
    }

    async function ensureFirebaseReady() {
      if (!isFirebaseConfigured()) {
        alert("Para usar código de juego debes configurar Firebase en el archivo index.html.");
        return false;
      }

      if (firebaseState.ready && firebaseState.user) return true;

      try {
        firebaseState.app = firebaseState.app || initializeApp(FIREBASE_CONFIG);
        firebaseState.auth = firebaseState.auth || getAuth(firebaseState.app);
        firebaseState.db = firebaseState.db || getDatabase(firebaseState.app);
        const credential = await signInAnonymously(firebaseState.auth);
        firebaseState.user = credential.user;
        firebaseState.ready = true;
        return true;
      } catch (error) {
        console.error(error);
        alert("No se pudo conectar con Firebase. Revisa la configuración y las reglas de seguridad.");
        return false;
      }
    }

    function isHostMode() {
      return sync.mode === "host";
    }

    function isViewerMode() {
      return sync.mode === "viewer";
    }

    function applyIncomingGameCode() {
      const params = new URLSearchParams(window.location.search);
      const code = normalizeGameCode(params.get("game") || params.get("juego") || "");
      if (!code) return;

      sync = { mode: "viewer", code, lastRemoteUpdate: null };
      ui.configVisible = false;
      saveSync();
      saveUi();
    }

    function normalizeGameCode(value) {
      const code = String(value || "").replace(/\D/g, "").slice(0, 7);
      return code.length === 7 ? code : "";
    }

    async function createOrUpdateGameCode() {
      if (!game) {
        alert("Primero inicia una partida para poder crear el código de juego.");
        return;
      }

      const ready = await ensureFirebaseReady();
      if (!ready) return;

      if (!isHostMode() || !sync.code) {
        const code = await generateUniqueGameCode();
        if (!code) return;

        sync = { mode: "host", code, lastRemoteUpdate: null };
        saveSync();
        await set(ref(firebaseState.db, `games/${code}/private`), {
          ownerUid: firebaseState.user.uid,
          createdAt: Date.now()
        });
      }

      const ok = await publishRemoteGame(true);
      if (!ok) return;

      const viewerUrl = buildViewerUrl(sync.code);
      const text = `Marcador Skyjo\nCódigo de juego: ${sync.code}\nVer marcador: ${viewerUrl}`;

      try {
        if (navigator.share) {
          await navigator.share({ title: "Marcador Skyjo", text });
        } else {
          await navigator.clipboard.writeText(text);
          alert(`Código de juego: ${sync.code}\n\nCopié el código y enlace al portapapeles.`);
        }
      } catch (error) {
        if (!error || error.name !== "AbortError") {
          alert(`Código de juego: ${sync.code}`);
        }
      }

      applyUi();
      renderGame();
    }

    async function generateUniqueGameCode() {
      for (let attempt = 0; attempt < 12; attempt++) {
        const code = String(Math.floor(1000000 + Math.random() * 9000000));
        const snapshot = await get(ref(firebaseState.db, `games/${code}/public`));
        if (!snapshot.exists()) return code;
      }

      alert("No se pudo generar un código disponible. Intenta nuevamente.");
      return null;
    }

    function buildPublicGame() {
      return {
        code: sync.code,
        updatedAt: Date.now(),
        createdAt: game.createdAt,
        rounds: game.rounds,
        players: game.players,
        startingDealerId: game.startingDealerId,
        scores: game.scores
      };
    }

    async function publishRemoteGame(showMessage = false) {
      if (!isHostMode() || !sync.code || !game) return false;

      const ready = await ensureFirebaseReady();
      if (!ready) return false;

      try {
        await set(ref(firebaseState.db, `games/${sync.code}/public`), buildPublicGame());
        sync.lastRemoteUpdate = new Date().toISOString();
        saveSync();
        renderSyncStatus();
        if (showMessage) showSaveStatus(`🔗 Código ${sync.code} actualizado`);
        return true;
      } catch (error) {
        console.error(error);
        if (showMessage) alert("No se pudo publicar el marcador. Revisa conexión y reglas de Firebase.");
        return false;
      }
    }

    function queueRemoteSave() {
      window.clearTimeout(remoteSaveTimer);
      remoteSaveTimer = window.setTimeout(() => {
        publishRemoteGame(false);
      }, 700);
    }

    async function askAndLoadSpectatorGame() {
      const current = sync.code || "";
      const input = prompt("Ingresa el código de juego de 7 cifras", current);
      const code = normalizeGameCode(input);

      if (!code) {
        if (input !== null) alert("El código debe tener 7 cifras numéricas.");
        return;
      }

      sync = { mode: "viewer", code, lastRemoteUpdate: null };
      ui.configVisible = false;
      saveSync();
      saveUi();
      applyUi();
      await refreshRemoteGame(true);
      startRemoteAutoRefresh();
    }

    async function refreshRemoteGame(showMessage = false) {
      if (!isViewerMode() || !sync.code) return;

      const ready = await ensureFirebaseReady();
      if (!ready) return;

      try {
        const snapshot = await get(ref(firebaseState.db, `games/${sync.code}/public`));
        if (!snapshot.exists()) {
          if (showMessage) alert("No encontré una partida con ese código.");
          return;
        }

        const remote = snapshot.val();
        game = normalizeRemoteGame(remote);
        sync.lastRemoteUpdate = new Date(remote.updatedAt || Date.now()).toISOString();
        saveSync();
        localStorage.setItem(GAME_KEY, JSON.stringify(game));
        applyUi();
        renderConfig();
        renderGame();
        if (showMessage) showSaveStatus("🔄 Marcador actualizado");
      } catch (error) {
        console.error(error);
        if (showMessage) alert("No se pudo refrescar el marcador.");
      }
    }

    function normalizeRemoteGame(remote) {
      return {
        createdAt: remote.createdAt || new Date().toISOString(),
        rounds: Number(remote.rounds) || 10,
        players: Array.isArray(remote.players) ? remote.players : [],
        startingDealerId: remote.startingDealerId || remote.players?.[0]?.id,
        scores: Array.isArray(remote.scores) ? remote.scores : []
      };
    }

    function startRemoteAutoRefresh() {
      stopRemoteAutoRefresh();
      if (!isViewerMode()) return;

      remoteRefreshTimer = window.setInterval(() => {
        refreshRemoteGame(false);
      }, 3 * 60 * 1000);
    }

    function stopRemoteAutoRefresh() {
      if (remoteRefreshTimer) window.clearInterval(remoteRefreshTimer);
      remoteRefreshTimer = null;
    }

    function exitViewerMode() {
      stopRemoteAutoRefresh();
      sync = { mode: null, code: null, lastRemoteUpdate: null };
      saveSync();
      ui.configVisible = true;
      saveUi();
      applyUi();
      renderConfig();
      renderGame();
    }

    function buildViewerUrl(code) {
      const url = new URL(window.location.href);
      url.searchParams.set("game", code);
      return url.toString();
    }

    function renderSyncStatus() {
      if (!sync.code) {
        el.syncStatus.classList.add("hidden");
        el.syncStatus.textContent = "";
        return;
      }

      const modeText = isViewerMode() ? "Solo lectura" : "Anfitrión";
      const updateText = sync.lastRemoteUpdate
        ? ` · ${new Date(sync.lastRemoteUpdate).toLocaleTimeString("es-CL", { hour: "2-digit", minute: "2-digit" })}`
        : "";

      el.syncStatus.textContent = `${isViewerMode() ? "👀" : "🔗"} Código ${sync.code} · ${modeText}${updateText}`;
      el.syncStatus.classList.remove("hidden");
    }

    async function shareSummary() {
      if (!game) return;

      const text = buildSummaryText();
      const shareData = {
        title: "Resultado Skyjo",
        text
      };

      try {
        if (navigator.share && navigator.canShare && navigator.canShare(shareData)) {
          await navigator.share(shareData);
          showSaveStatus("📤 Compartido");
          return;
        }

        if (navigator.share) {
          await navigator.share(shareData);
          showSaveStatus("📤 Compartido");
          return;
        }

        await navigator.clipboard.writeText(text);
        showSaveStatus("📋 Copiado");
        alert("Resultado copiado al portapapeles.");
      } catch (error) {
        if (error && error.name === "AbortError") return;

        try {
          await navigator.clipboard.writeText(text);
          showSaveStatus("📋 Copiado");
          alert("No se pudo abrir el menú de compartir. El resultado fue copiado al portapapeles.");
        } catch {
          alert("No se pudo compartir ni copiar el resultado.");
        }
      }
    }

    function buildSummaryText() {
      const totals = getTotals();
      const rows = game.players.map((player, index) => ({
        name: player.name,
        total: totals[index]
      })).sort((a, b) => a.total - b.total);

      const currentRoundIndex = getCurrentRoundIndex();
      const status = currentRoundIndex === null ? "Partida completa" : `Partida en curso, ronda activa ${currentRoundIndex + 1}`;

      const lines = [
        "Resultado Skyjo",
        status,
        `Jugadores: ${game.players.length}`,
        `Rondas: ${game.rounds}`,
        "",
        "Tabla de posiciones:",
        ...rows.map((row, index) => `${index + 1}. ${row.name}: ${formatNumber(row.total)} puntos`),
        "",
        "Detalle por ronda:"
      ];

      game.scores.forEach((round, roundIndex) => {
        const detail = round.map((score, playerIndex) => {
          const value = score === null || score === undefined ? "-" : formatNumber(score);
          return `${game.players[playerIndex].name}: ${value}`;
        }).join(" | ");
        lines.push(`Ronda ${roundIndex + 1}: ${detail}`);
      });

      return lines.join("\n");
    }

    function getIndexById(players, id) {
      const index = players.findIndex(player => player.id === id);
      return index >= 0 ? index : 0;
    }

    function scrollToScore() {
      el.scorePanel.scrollIntoView({ block: "start" });
    }

    function formatNumber(value) {
      return Number(value).toLocaleString("es-CL");
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function hexToRgba(hex, alpha) {
      const clean = hex.replace("#", "");
      const bigint = parseInt(clean, 16);
      const r = (bigint >> 16) & 255;
      const g = (bigint >> 8) & 255;
      const b = bigint & 255;
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function clone(value) {
      if (window.structuredClone) return structuredClone(value);
      return JSON.parse(JSON.stringify(value));
    }
  </script>
